<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Timeless Threads</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #fdf5f7; 
            margin: 0; 
            text-align: center; 
        }
        header { 
            background: white; 
            padding: 30px; 
            border-bottom: 4px solid #800020; 
        }
        .logo { width: 150px; border-radius: 50%; }
        h1 { color: #800020; margin: 10px 0; }
        
        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            padding: 30px; 
        }
        .item { 
            background: white; 
            width: 240px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            padding-bottom: 10px;
        }
        .item img { 
            width: 100%; 
            height: 350px; 
            object-fit: contain; 
        }
        h3 { color: #800020; margin: 10px 0; font-size: 1.1em; }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg" class="logo">
        <h1>TIMELESS THREADS</h1>
        <p><i>Handmade with Love</i></p>
    </header>

    <div class="gallery">
        <div class="item"><img src="worry_worm.jpg"><h3>Happy Worm Charm</h3></div>
        <div class="item"><img src="smiley.jpg"><h3>Book Mark</h3></div>
        <div class="item"><img src="scrunchie_gold.jpg"><h3>Hair Band</h3></div>
        <div class="item"><img src="scrunchie_purple.jpg"><h3>Scrunchie</h3></div>
        <div class="item"><img src="button_pouch.jpg"><h3>Card Holder</h3></div>
    </div>

</body>
</html>
